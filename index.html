<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Website Title</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }
        nav {
            background-color: #ffb300; /* Amber */
            padding: 15px;
            transition: background-color 0.3s ease;
        }
        nav a {
            color: #121212; /* Dark text on amber background */
            margin: 0 15px;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        h1, h2, h3 {
            color: red; /* Red headings */
        }
        .hidden-section {
            display: none;
        }
    </style>
</head>
<body>

<nav>
    <a href="#tuote">Tuote</a>
    <a href="#ominaisuudet">Ominaisuudet</a>
    <a href="#yhteystiedot">Yhteystiedot</a>
</nav>

<section id="tuote">
    <h1>Tuote</h1>
    <p>Original content about the product...</p>
</section>
<section id="ominaisuudet">
    <h2>Ominaisuudet</h2>
    <p>Original features content...</p>
</section>
<section id="yhteystiedot">
    <h3>Yhteystiedot</h3>
    <p>Original contact content...</p>
</section>

<script>
    function toggleHiddenSection() {
        var section = document.querySelector('.hidden-section');
        if (section.style.display === 'none') {
            section.style.display = 'block';
        } else {
            section.style.display = 'none';
        }
    }
</script>

</body>
</html>
