<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Site</title>
    <style>
        body { background-color: black; color: white; }
        .tab { display: inline-block; margin: 10px; padding: 10px; border: 1px solid white; cursor: pointer; }
        .content { display: none; padding: 20px; border: 1px solid red; background-color: yellow; }
        .active { background-color: red; }
    </style>
</head>
<body>
    <div>
        <div class="tab" onclick="showTab('section1')">Tab 1</div>
        <div class="tab" onclick="showTab('section2')">Tab 2</div>
        <div class="tab" onclick="showTab('section3')">Tab 3</div>
    </div>
    <div id="section1" class="content">
        <h2>Section 1</h2>
        <p>Content for section 1...</p>
    </div>
    <div id="section2" class="content">
        <h2>Section 2</h2>
        <p>Content for section 2...</p>
    </div>
    <div id="section3" class="content">
        <h2>Section 3</h2>
        <p>Content for section 3...</p>
    </div>
    <script>
        function showTab(sectionId) {
            const contents = document.querySelectorAll('.content');
            contents.forEach(content => content.style.display = 'none');
            const activeTab = document.querySelectorAll('.tab');
            activeTab.forEach(tab => tab.classList.remove('active'));
            document.getElementById(sectionId).style.display = 'block';
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
