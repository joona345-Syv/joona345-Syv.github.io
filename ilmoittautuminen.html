<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ilmoittautuminen</title>
    <link rel="stylesheet" href="tyylit.css">
</head>
<body>

<header>
<div class="header-content">
    <div class="header-left">
        <img src="kuvat/vappulogo.png" class="logo">
        <h1>Ilmoittautuminen</h1>
    </div>

    <button id="musicToggle" class="music-control">🔊</button>
        <audio id="bgMusic" loop>
        <source src="music/vapputaustamus.mp3" type="audio/mpeg">
        </audio>

</div>
<button class="menu-toggle" onclick="toggleMenu()">☰</button>

<nav>
    <ul id="navMenu">
        <li><a href="index.html">Etusivu</a></li>
        <li><a href="opiskelijat.html">Opiskelijavappu Lahdessa</a></li>
        <li><a href="tori.html">Lahden tori</a></li>
        <li><a href="tapahtumat.html">Tapahtumat ja musiikki</a></li>
        <li><a href="ilmoittautuminen.html">Ilmoittautuminen</a></li>
    </ul>
</nav>
</header>

<main class="container">

    <div class="card">
        <h2>Ilmoittaudu mukaan ✍️</h2>
        <p>Täytä lomake osallistuaksesi tapahtumiin.</p>

        <form id="signupForm">
            <label>Nimi:</label><br>
            <input type="text" name="nimi" required><br><br>

            <label>Email:</label><br>
            <input type="email" name="email" required><br><br>

            <label>Tapahtuma:</label><br>
            <select name="tapahtuma">
                <option>Opiskelijabileet</option>
                <option>Toritapahtuma</option>
                <option>Konsertti</option>
            </select><br><br>

            <button type="submit" class="button">Lähetä</button>
        </form>

        <p id="status"></p>
    </div>

</main>

<footer>
    <p>© 2026 Vappu Lahti</p>
</footer>
<script>
document.getElementById("signupForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const form = e.target;
    const status = document.getElementById("status");

    const formData = new FormData();
    formData.append("nimi", form.nimi.value);
    formData.append("email", form.email.value);
    formData.append("tapahtuma", form.tapahtuma.value);

    fetch("https://script.google.com/macros/s/AKfycbxcqhlhLgK4lvKxHywPJtqoHlUyyCMw0jlSB16aZEmiC6t08oWe_09zh2WizcVuTmlUSw/exec", {
        method: "POST",
        body: formData
    })
    .then(() => {
        status.textContent = "✅ Ilmoittautuminen onnistui!";
        form.reset();
    })
    .catch(() => {
        status.textContent = "❌ Virhe lähetyksessä";
    });
});
</script>
<script src="script.js"></script>
</body>
</html>
